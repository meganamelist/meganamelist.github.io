<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WINTERFELL MEGA</title>
  <meta name="description" content="รายชื่อสมาชิกแก๊ง WINTERFELL MEGA">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <audio id="bgAudio" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
    <source src="music.mp3" type="audio/mpeg">
    <source src="audio.mp3" type="audio/mpeg">
  </audio>

  <div class="bg-container">
    <img src="bg.jpg" alt="Background" class="bg-image">
    <div class="bg-overlay"></div>
    <canvas id="starsCanvas"></canvas>
    <div class="ambient-orb ambient-orb--gold"></div>
    <div class="ambient-orb ambient-orb--purple"></div>
  </div>
  <div class="corner-border corner-top-left"></div>
  <div class="corner-border corner-top-right"></div>
  <div class="corner-border corner-bottom-left"></div>
  <div class="corner-border corner-bottom-right"></div>

  <div class="member-count-badge">
    <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24" style="opacity:0.85"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    <span id="statTotal">0</span>
    <span class="member-count-label">สมาชิก</span>
  </div>

  <div class="app-container">

    <header class="hero">
      <div class="logo-wrapper">
        <img src="logo.png" alt="WINTERFELL MEGA Logo" class="hero-logo">
      </div>

      <h1 class="hero-title">WINTERFELL MEGA</h1>
      
      <div class="hero-subtitle-wrapper">
        <div class="gold-line"></div>
        <span class="hero-subtitle">NAMELIST MEMBERS</span>
        <div class="gold-line"></div>
      </div>


    </header>
    <section class="controls-card">
      <div class="search-row">
        <div class="search-box">
          <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="ค้นหารายชื่อสมาชิก...">
        </div>
      </div>
    </section>

    <main>
      <div class="members-grid" id="membersGrid">
      </div>
    </main>
  </div>

  <div class="music-widget-container">
    <div class="music-tooltip" id="musicTooltip">กดเพื่อเล่นเพลง</div>
    
    <div class="music-btn-wrapper" id="musicBtnWrapper" title="เปิด/ปิดเพลงประกอบ">
      <div class="music-pulse-ring"></div>
      
      <div class="music-btn">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <path id="playPausePath" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
    </div>
  </div>

  <script src="stars.js"></script>
  <script src="members.js"></script>
  <script src="main.js"></script>
</body>
</html>
