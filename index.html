<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WINTERFELL MEGA</title>
  <meta name="description" content="WINTERFELL MEGA - Welcome">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      background: #000;
      color: #fff;
    }

    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      filter: saturate(0.6) brightness(0.7);
    }

    .bg-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.75) 70%, rgba(0,0,0,0.95) 100%);
    }

    canvas#landingStars {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .corner-border {
      position: fixed;
      width: 36px;
      height: 36px;
      z-index: 10;
      pointer-events: none;
    }
    .corner-top-left    { top: 18px; left: 18px; border-left: 1.5px solid rgba(245,197,99,0.6); border-top: 1.5px solid rgba(245,197,99,0.6); }
    .corner-top-right   { top: 18px; right: 18px; border-right: 1.5px solid rgba(245,197,99,0.6); border-top: 1.5px solid rgba(245,197,99,0.6); }
    .corner-bottom-left { bottom: 18px; left: 18px; border-left: 1.5px solid rgba(245,197,99,0.6); border-bottom: 1.5px solid rgba(245,197,99,0.6); }
    .corner-bottom-right{ bottom: 18px; right: 18px; border-right: 1.5px solid rgba(245,197,99,0.6); border-bottom: 1.5px solid rgba(245,197,99,0.6); }

    .landing-wrap {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
      gap: 0;
    }

    .logo-ring {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 1.5px solid rgba(245, 197, 99, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      position: relative;
      animation: ringPulse 4s ease-in-out infinite;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(245, 197, 99, 0.15);
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,197,99,0); }
      50% { box-shadow: 0 0 30px 6px rgba(245,197,99,0.12); }
    }

    .logo-ring img {
      width: 78px;
      height: 78px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(245,197,99,0.5));
      animation: logoFloat 6s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .main-title {
      font-size: clamp(2.8rem, 9vw, 6.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 18px;
      text-shadow: 0 0 60px rgba(255,255,255,0.08);
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.1s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .subtitle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 36px;
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.25s;
    }

    .subtitle-line {
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,197,99,0.7), transparent);
    }

    .subtitle-text {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: rgba(245, 197, 99, 0.8);
      text-transform: uppercase;
    }

    .members-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(14, 14, 14, 0.75);
      border: 1px solid rgba(245, 197, 99, 0.4);
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      animation: fadeUp 0.9s ease both;
      animation-delay: 0.4s;
      position: relative;
      overflow: hidden;
    }

    .members-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,197,99,0.12) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .members-btn:hover::before {
      opacity: 1;
    }

    .members-btn:hover {
      border-color: rgba(245, 197, 99, 0.8);
      box-shadow: 0 0 28px rgba(245,197,99,0.2), inset 0 0 20px rgba(245,197,99,0.05);
      color: #ffe58f;
      transform: translateY(-2px);
    }

    .members-btn svg {
      transition: transform 0.3s ease;
    }

    .members-btn:hover svg {
      transform: translateX(4px);
    }

    .bottom-footer {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: footerFadeUp 1s ease both;
      animation-delay: 0.6s;
    }

    @keyframes footerFadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scroll-dots {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .scroll-line {
      width: 1px;
      height: 24px;
      background: linear-gradient(180deg, rgba(245,197,99,0.6) 0%, transparent 100%);
    }

    .scroll-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(245,197,99,0.9);
      box-shadow: 0 0 8px rgba(245,197,99,0.6);
      animation: dotBounce 2s ease-in-out infinite;
    }

    @keyframes dotBounce {
      0%, 100% { opacity: 0.4; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(3px); }
    }

    .powered-text {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }

    .powered-text span {
      color: rgba(245,197,99,0.5);
    }

    .stats-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 10;
      width: 38px;
      height: 38px;
      background: rgba(14,14,14,0.7);
      border: 1px solid rgba(245,197,99,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      color: rgba(245,197,99,0.7);
    }

    .stats-btn:hover {
      border-color: rgba(245,197,99,0.7);
      color: #ffd700;
      box-shadow: 0 0 16px rgba(245,197,99,0.2);
    }

    .music-btn-fixed {
      position: fixed;
      bottom: 28px;
      right: 76px;
      z-index: 10;
      width: 38px;
      height: 38px;
      background: rgba(14,14,14,0.7);
      border: 1px solid rgba(245,197,99,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      color: rgba(245,197,99,0.7);
    }

    .music-btn-fixed:hover {
      border-color: rgba(245,197,99,0.7);
      color: #ffd700;
      box-shadow: 0 0 16px rgba(245,197,99,0.2);
    }

    .music-btn-fixed.playing {
      border-color: #ffd700;
      color: #ffd700;
      box-shadow: 0 0 20px rgba(255,215,0,0.3);
    }

    @media (max-width: 600px) {
      .logo-ring {
        width: 100px;
        height: 100px;
        margin-bottom: 22px;
      }
      .logo-ring img { width: 58px; height: 58px; }
      .main-title { letter-spacing: 0.04em; }
      .members-btn { padding: 12px 24px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <audio id="bgAudio" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
    <source src="music.mp3" type="audio/mpeg">
    <source src="audio.mp3" type="audio/mpeg">
  </audio>

  <div class="bg-wrap">
    <img src="bg.jpg" alt="Background">
  </div>

  <canvas id="landingStars"></canvas>

  <div class="corner-border corner-top-left"></div>
  <div class="corner-border corner-top-right"></div>
  <div class="corner-border corner-bottom-left"></div>
  <div class="corner-border corner-bottom-right"></div>

  <div class="landing-wrap">

    <h1 class="main-title">WINTERFELL MEGA</h1>

    <div class="subtitle-row">
      <div class="subtitle-line"></div>
      <span class="subtitle-text">• WINTERFELL MEGA •</span>
      <div class="subtitle-line"></div>
    </div>

    <a href="members.html" class="members-btn" id="membersBtn">
      MEMBERS
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </a>

  <div class="bottom-footer">
    <div class="scroll-dots">
      <div class="scroll-line"></div>
      <div class="scroll-dot"></div>
    </div>
  </div>

  <div class="stats-btn" id="statsBtn" title="สมาชิก">
    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
      <path d="M5 12h2v9H5zm6-7h2v16h-2zm6 4h2v12h-2z"/>
    </svg>
  </div>



  <script>
    const canvas = document.getElementById('landingStars');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [], shooters = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();

    class Star {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.1 + 0.2;
        this.a = Math.random() * 0.55 + 0.08;
        this.spd = Math.random() * 0.01 + 0.003;
        this.dir = Math.random() > 0.5 ? 1 : -1;
        this.hue = Math.floor(Math.random() * 20 + 40);
      }
      tick() {
        this.a += this.spd * this.dir;
        if (this.a > 0.8) this.dir = -1;
        if (this.a < 0.05) this.dir = 1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue},85%,80%,${this.a})`;
        ctx.shadowBlur = this.r * 5;
        ctx.shadowColor = `hsla(${this.hue},85%,80%,0.5)`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    class Shooter {
      constructor() { this.spawn(); }
      spawn() {
        this.x = Math.random() * W * 1.2;
        this.y = Math.random() * H * 0.35 - 30;
        this.len = Math.random() * 90 + 40;
        this.spd = Math.random() * 4 + 2;
        this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.25;
        this.a = 0;
        this.maxA = Math.random() * 0.7 + 0.25;
        this.r = Math.random() * 1.4 + 0.4;
        this.life = 0;
        this.maxLife = Math.floor(Math.random() * 80 + 55);
        this.hue = Math.floor(Math.random() * 20 + 42);
        this.dead = false;
      }
      tick() {
        this.life++;
        this.x += Math.cos(this.angle) * this.spd;
        this.y += Math.sin(this.angle) * this.spd;
        const thresh = this.maxLife * 0.2;
        this.a = this.life < thresh
          ? (this.life / thresh) * this.maxA
          : ((this.maxLife - this.life) / (this.maxLife - thresh)) * this.maxA;
        if (this.life >= this.maxLife || this.x > W + 80 || this.y > H + 80) this.dead = true;
      }
      draw() {
        const tx = this.x - Math.cos(this.angle) * this.len;
        const ty = this.y - Math.sin(this.angle) * this.len;
        const g = ctx.createLinearGradient(tx, ty, this.x, this.y);
        g.addColorStop(0, `hsla(${this.hue},90%,80%,0)`);
        g.addColorStop(0.6, `hsla(${this.hue},100%,90%,${this.a * 0.4})`);
        g.addColorStop(1, `hsla(${this.hue},100%,100%,${this.a})`);
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(this.x, this.y);
        ctx.strokeStyle = g;
        ctx.lineWidth = this.r;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 8;
        ctx.shadowColor = `hsla(${this.hue},100%,85%,${this.a * 0.5})`;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 1.2, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue},100%,98%,${this.a})`;
        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsla(${this.hue},100%,90%,${this.a})`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function initStars() {
      stars = Array.from({ length: 130 }, () => new Star());
    }

    let stimer = 0;
    function loop() {
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => { s.tick(); s.draw(); });
      stimer++;
      if (stimer >= 42 && shooters.length < 5) { shooters.push(new Shooter()); stimer = 0; }
      shooters = shooters.filter(s => !s.dead);
      shooters.forEach(s => { s.tick(); s.draw(); });
      requestAnimationFrame(loop);
    }

    initStars();
    loop();


  </script>
</body>
</html>
